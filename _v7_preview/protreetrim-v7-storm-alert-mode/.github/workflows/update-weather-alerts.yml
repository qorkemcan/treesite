name: Update Florida weather alert banner

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-weather-alerts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update weather alert data
        run: node scripts/update-weather-alerts.mjs

      - name: Commit changes if alert changed
        run: |
          if git diff --quiet src/data/site-alert.json; then
            echo "No weather alert data changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/site-alert.json
          git commit -m "Update Florida weather alert banner"
          git push
